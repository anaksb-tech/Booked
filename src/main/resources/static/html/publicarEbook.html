<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Publicar eBook</title>

</head>

<body>

    <h1>Publicar eBook</h1>

    <form>

        <label>Título:</label>
        <input id="inputTitulo" type="text" required>

        <br>
        <br>

        <label>Sinopse:</label>
        <input id="inputSinopse" type="text" required>

        <br>
        <br>

        <label>Autor:</label>
        <input id="inputAutor" type="text" required>

        <br>
        <br>

        <label>Preço:</label>
        <input id="inputPreco" type="number" required>

        <br>
        <br>

        <button id="botaoPublicar" type="button">Publicar</button>

    </form>

    <script src="/javascript/publicarEbook.js"></script>
</body>

</html>
